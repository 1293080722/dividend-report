name: 红利组合日报

on:
  schedule:
    # 北京时间每周一、周三 9:30（UTC 1:30）
    - cron: "30 1 * * 1,3"
  workflow_dispatch:  # 支持手动触发

# 全局最小权限，各 Job 自行声明所需权限
permissions: {}

jobs:
  # ===== Job 1：生成报告 =====
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # 此 Job 需要写代码（git push）
    permissions:
      contents: write
    outputs:
      report-ready: ${{ steps.gen.outcome }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史才能 push

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 生成报告
        id: gen
        env:
          DIV_EMAIL_FROM: ${{ secrets.DIV_EMAIL_FROM }}
          DIV_EMAIL_TO: ${{ secrets.DIV_EMAIL_TO }}
          DIV_SMTP_PASS: ${{ secrets.DIV_SMTP_PASS }}
        run: python report_generator.py

      - name: 提交报告到仓库
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add "红利组合综合估值报告_*.html" report_summary.json 2>/dev/null || true
          git add "红利组合综合估值报告_latest.html" 2>/dev/null || true
          git diff --staged --quiet || git commit -m "📊 自动更新日报 $(date +'%Y-%m-%d')"
          git push

      - name: 上传 Pages 产物
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  # ===== Job 2：部署到 GitHub Pages =====
  deploy:
    needs: generate
    if: success()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # 此 Job 只需要 Pages 部署权限
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
