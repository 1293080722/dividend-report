name: 红利组合日报

on:
  schedule:
    # 北京时间每周一、周三 9:30（UTC 1:30）
    - cron: "30 1 * * 1,3"
  workflow_dispatch:  # 支持手动触发

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 生成并发送报告
        env:
          DIV_EMAIL_FROM: ${{ secrets.DIV_EMAIL_FROM }}
          DIV_EMAIL_TO: ${{ secrets.DIV_EMAIL_TO }}
          DIV_SMTP_PASS: ${{ secrets.DIV_SMTP_PASS }}
        run: python report_generator.py

      - name: 提交报告到仓库（可选）
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add 红利组合综合估值报告_*.html report_summary.json 红利组合综合估值报告_latest.html
          git diff --staged --quiet || git commit -m "📊 自动更新日报 $(date +'%Y-%m-%d')"
          git push
